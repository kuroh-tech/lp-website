<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせありがとうございます｜DF CONNECT</title>
  <meta name="description" content="DF CONNECTへのお問い合わせありがとうございます。">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="DF CONNECT トップへ">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8h12a8 8 0 0 1 0 16H6z"></path>
            <path d="M22 16h6"></path>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-main">DF CONNECT</span>
          <span class="brand-sub">Production Partner for Agencies</span>
        </span>
      </a>
    </div>
  </header>

  <main class="section">
    <div class="container" style="max-width: 720px;">
      <header class="section-heading">
        <p class="section-eyebrow">THANK YOU</p>
        <h1 style="font-size: clamp(28px, 3.6vw, 40px);">お問い合わせありがとうございます。</h1>
        <p class="section-lead">
          お問い合わせ内容を受け付けました。<br>
          内容を確認のうえ、通常1〜2営業日以内にご返信いたします。
        </p>
      </header>

      <div class="contact-form" style="text-align: left;">
        <p style="margin: 0; color: var(--c-body); font-size: 14.5px; line-height: 1.85; font-weight: 500;">
          案件詳細やクライアント名などの機密情報は、<strong>NDA締結後の共有でも問題ありません</strong>。まずは概要のみでご相談いただけます。
        </p>
        <p class="form-note">
          数分以内に自動返信メールが届かない場合は、迷惑メールフォルダもご確認ください。
        </p>
        <a class="button button-primary" href="index.html">
          <span>トップへ戻る</span>
          <svg class="button-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
        </a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <p class="copyright">© DF CONNECT</p>
      <p class="footer-bottom-links">
        <a href="privacy.html">Privacy Policy</a>
      </p>
    </div>
  </footer>
</body>
</html>
